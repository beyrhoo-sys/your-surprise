<!DOCTYPE html>
<html>
<head>
  <title>For my beautiful girl ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #1a001a, #000000);
      overflow: hidden;
      color: white;
      font-family: 'Poppins', sans-serif;
      text-align: center;
    }

    #login {
      position: absolute;
      top: 40%;
      width: 100%;
      transition: opacity 1s;
    }

    h2 {
      font-family: 'Great Vibes', cursive;
      font-size: 48px;
      color: #ff4d6d;
      text-shadow: 0 0 15px rgba(255, 77, 109, 0.6);
      margin-bottom: 20px;
    }

    input {
      padding: 12px;
      border-radius: 10px;
      border: none;
      text-align: center;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: pink;
      cursor: pointer;
    }

    #matrix-phase {
      position: absolute;
      inset: 0;
      display: none;
      z-index: 50;
      transition: opacity 1s ease;
    }

    canvas {
      width: 100%;
      height: 100%;
    }

    #countdown-num {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 120px;
      color: #ff69b4;
      text-shadow: 0 0 40px #ff1493;
      opacity: 0;
      z-index: 60;
    }

    .heart {
      position: absolute;
      animation: fall 5s linear forwards;
    }

    @keyframes fall {
      0% { top: -10%; }
      100% { top: 100%; opacity: 0; }
    }

    .wish {
      position: absolute;
      font-family: 'Great Vibes', cursive;
      color: #ff85c1;
      text-shadow: 0 0 10px #ff1493, 0 0 30px #ff69b4;
      animation: wishPop 4s ease-out forwards;
    }

    @keyframes wishPop {
      0% { transform: scale(0.3); opacity: 0; }
      30% { transform: scale(1.2); opacity: 1; }
      100% { transform: translateY(-60px); opacity: 0; }
    }

    #nextBtn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      font-family: 'Great Vibes', cursive;
      font-size: 28px;
      color: #ff69b4;
      text-shadow: 0 0 10px #ff1493, 0 0 30px #ff69b4;
      opacity: 0;
      pointer-events: none;
      transition: 1s;
      animation: glowPulse 2.5s infinite;
    }

    #nextBtn.show {
      opacity: 1;
      pointer-events: auto;
    }

    @keyframes glowPulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
  </style>
</head>
<body>

<div id="login">
  <h2>Only For Birthday Girl 💌</h2>
  <input type="password" id="pass">
  <br><br>
  <button onclick="check()">Open 💖</button>
</div>

<div id="matrix-phase">
  <canvas id="matrixCanvas"></canvas>
</div>

<div id="countdown-num"></div>
<div id="nextBtn" onclick="goNext()">next</div>

<audio id="music" loop>
  <source src="song.mp3">
</audio>

<script>
const heartEmojis = ['❤️','💓','💖','💘'];

function check() {
  if (document.getElementById('pass').value === '111498') {
    document.getElementById('login').style.display = 'none';
    startMatrix();
  }
}

/* MATRIX FULL */
function startMatrix() {
  const canvas = document.getElementById('matrixCanvas');
  const ctx = canvas.getContext('2d');

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const chars = 'アイウエオ0123456789♥♡★';
  const size = 14;
  const columns = canvas.width / size;
  const drops = Array.from({length: columns}, () => 1);

  const interval = setInterval(() => {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "#ff69b4";
    ctx.font = size + "px monospace";

    drops.forEach((y, i) => {
      const text = chars[Math.random()*chars.length|0];
      ctx.fillText(text, i*size, y*size);
      if (y*size > canvas.height && Math.random()>0.975) drops[i]=0;
      drops[i]++;
    });
  }, 33);

  setTimeout(() => {
    runCountdown(3, () => {
      clearInterval(interval);
      document.getElementById('matrix-phase').style.display = 'none';
      startEffect();
      fadeMusic();
    });
  }, 1500);
}

function runCountdown(n, cb) {
  const el = document.getElementById('countdown-num');

  function show() {
    if (n < 1) return cb();
    el.textContent = n--;
    el.style.opacity = 1;
    setTimeout(()=>{
      el.style.opacity = 0;
      setTimeout(show,300);
    },700);
  }
  show();
}

function fadeMusic() {
  const m = document.getElementById('music');
  m.volume = 0;
  m.play();
  let v=0;
  const i=setInterval(()=>{
    if(v<1){v+=0.05;m.volume=v;}
    else clearInterval(i);
  },200);
}

/* EFFECT */
function startEffect() {
  const images = ['pic1.jpg','pic2.jpg','pic3.jpg'];

  setInterval(()=>{
    const img=document.createElement('img');
    img.src=images[Math.random()*images.length|0];
    img.style.position='absolute';
    img.style.top='-100px';
    img.style.left=Math.random()*100+'%';
    img.style.width=(Math.random()*80+50)+'px';
    img.style.animation='fall 5s linear';
    document.body.appendChild(img);
    setTimeout(()=>img.remove(),5000);
  },300);

  setInterval(()=>{
    const h=document.createElement('div');
    h.className='heart';
    h.innerHTML=heartEmojis[Math.random()*heartEmojis.length|0];
    h.style.left=Math.random()*100+'%';
    h.style.fontSize=(Math.random()*20+10)+'px';
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
  },200);

  setInterval(()=>{
    const t=document.createElement('div');
    t.className='wish';
    t.innerHTML='happy birthday sayang ♥️';
    t.style.left=Math.random()*100+'%';
    t.style.top=(Math.random()*80+10)+'%';
    t.style.fontSize=(Math.random()*20+20)+'px';
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),4000);
  },500);

  setTimeout(()=>{
    document.getElementById('nextBtn').classList.add('show');
  },15000);
}

function goNext(){
  alert("Next part sini 😏");
}
</script>

</body>
</html>
