<!DOCTYPE html>
<html>
<head>
  <title>For my beautiful girl ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #1a001a, #000000);
      overflow: hidden;
      color: white;
      font-family: 'Poppins', sans-serif;
      text-align: center;
    }

    #login {
      position: absolute;
      top: 40%;
      width: 100%;
      transition: opacity 1s;
    }

    h2 {
      font-family: 'Great Vibes', cursive;
      font-size: 48px;
      color: #ff4d6d;
      text-shadow: 0 0 15px rgba(255, 77, 109, 0.6);
      margin-bottom: 20px;
    }

    input {
      padding: 12px 15px;
      font-size: 16px;
      border-radius: 12px;
      border: none;
      outline: none;
      background: rgba(255, 255, 255, 0.1);
      color: #ff4d6d;
      text-shadow: 0 0 8px rgba(255, 77, 109, 0.8);
      backdrop-filter: blur(10px);
      box-shadow: 0 0 10px rgba(255,255,255,0.2);
      text-align: center;
      transition: 0.3s;
    }

    input:focus {
      box-shadow: 0 0 15px #ff4d6d;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(45deg, #ff4d6d, #ff85a2);
      color: white;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(255, 77, 109, 0.6);
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(255, 77, 109, 1);
    }

    #matrix-phase {
      position: absolute;
      inset: 0;
      display: none;
      z-index: 50;
      transition: opacity 1s ease;
    }

    canvas#matrixCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #countdown-num {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(1);
      font-size: min(22vw, 200px);
      font-weight: 900;
      color: #ff69b4;
      text-shadow: 0 0 40px #ff1493, 0 0 100px #ff69b4;
      font-family: 'Arial Black', sans-serif;
      z-index: 60;
      opacity: 0;
      pointer-events: none;
      transition: transform 0.35s ease, opacity 0.35s ease;
    }

    .heart {
      position: absolute;
      animation: fall 5s linear forwards;
      pointer-events: none;
    }

    @keyframes fall {
      0%   { top: -10%; opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    /* ── NEW: FLOATING WISH TEXT ── */
    .wish {
      position: absolute;
      font-family: 'Great Vibes', cursive;
      font-size: 28px;
      color: #ff85c1;
      text-shadow: 
        0 0 5px #ff69b4,
        0 0 15px #ff1493,
        0 0 25px #ff69b4;
      opacity: 0;
      pointer-events: none;
      z-index: 1;
      animation: wishPop 4s ease-out forwards;
    }

    @keyframes wishPop {
      0% {
        transform: scale(0.3) translateY(20px);
        opacity: 0;
        filter: blur(4px);
      }
      20% {
        transform: scale(1.2) translateY(0px);
        opacity: 1;
        filter: blur(0);
      }
      60% {
        transform: scale(1) translateY(-20px);
        opacity: 1;
      }
      100% {
        transform: scale(0.9) translateY(-60px);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

<div id="login">
  <h2>Only For Birthday Girl 💌</h2>
  <input type="password" id="pass" placeholder="Enter password...">
  <br><br>
  <button onclick="check()">Open 💖</button>
</div>

<div id="matrix-phase">
  <canvas id="matrixCanvas"></canvas>
</div>

<div id="countdown-num"></div>

<audio id="music" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
const heartEmojis = ['❤️','💓','💖','💘'];

function check() {
  const p = document.getElementById('pass').value;
  if (p === '111498') {
    const loginBox = document.getElementById('login');
    loginBox.style.opacity = '0';
    setTimeout(() => {
      loginBox.style.display = 'none';
      startMatrix();
    }, 1000);
  } else {
    alert('Wrong password!');
  }
}

function fadeInMusic() {
  const music = document.getElementById('music');
  music.volume = 0;
  music.play().then(() => {
    let vol = 0;
    const iv = setInterval(() => {
      if (vol < 1) { vol = Math.min(1, vol + 0.05); music.volume = vol; }
      else clearInterval(iv);
    }, 200);
  }).catch(() => {});
}

function startMatrix() {
  const phase = document.getElementById('matrix-phase');
  phase.style.display = 'block';

  const canvas = document.getElementById('matrixCanvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const chars = 'アイウエオ0123456789♥♡★';
  const fs = 14;
  let drops = Array.from({ length: Math.floor(canvas.width / fs) }, () => Math.random() * -60);

  const matrixIv = setInterval(() => {
    const cols = Math.floor(canvas.width / fs);
    while (drops.length < cols) drops.push(0);

    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < cols; i++) {
      const ch = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillStyle = '#ff69b4';
      ctx.font = fs + 'px monospace';
      ctx.fillText(ch, i * fs, drops[i] * fs);
      if (drops[i] * fs > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
  }, 33);

  setTimeout(() => {
    runCountdown(3, () => {
      clearInterval(matrixIv);
      phase.style.opacity = '0';
      setTimeout(() => {
        phase.style.display = 'none';
        phase.style.opacity = '1';
        startEffect();
        fadeInMusic();
      }, 1000);
    });
  }, 1500);
}

function runCountdown(from, cb) {
  const el = document.getElementById('countdown-num');
  let n = from;

  function showNum(num, done) {
    el.textContent = num;
    el.style.opacity = '1';
    el.style.transform = 'translate(-50%, -50%) scale(1.3)';
    setTimeout(() => {
      el.style.transform = 'translate(-50%, -50%) scale(0.7)';
      el.style.opacity = '0';
      setTimeout(done, 380);
    }, 720);
  }

  function next() {
    if (n < 1) { cb(); return; }
    showNum(n--, () => setTimeout(next, 100));
  }
  next();
}

function startEffect() {
  const images = ['pic1.jpg', 'pic2.jpg', 'pic3.jpg'];

  setInterval(() => {
    const img = document.createElement('img');
    img.src = images[Math.floor(Math.random() * images.length)];
    img.style.position = 'absolute';
    img.style.top = '-100px';
    img.style.left = Math.random() * 100 + '%';
    img.style.width = (Math.random() * 80 + 50) + 'px';
    img.style.animation = 'fall 5s linear';
    document.body.appendChild(img);
    setTimeout(() => img.remove(), 5000);
  }, 300);

  setInterval(() => {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.innerHTML = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
    heart.style.left = Math.random() * 100 + '%';
    heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
  }, 200);

  // ── NEW: FLOATING TEXT ──
  setInterval(() => {
    const text = document.createElement('div');
    text.className = 'wish';
    text.innerHTML = 'happy birthday sayang ♥️';

    text.style.left = Math.random() * 100 + '%';
    text.style.top = (Math.random() * 80 + 10) + '%';
    text.style.fontSize = (Math.random() * 20 + 20) + 'px';

    document.body.appendChild(text);
    setTimeout(() => text.remove(), 4000);
  }, 500);
}
</script>
</body>
</html>
