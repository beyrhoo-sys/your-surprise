<!DOCTYPE html>
<html>
<head>
  <title>For my beautiful girl ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #1a001a, #000000);
  overflow: hidden;
  color: white;
  font-family: 'Poppins', sans-serif;
  text-align: center;
}

/* LOGIN */
#login { position: absolute; top: 40%; width: 100%; z-index: 10; }
h2 {
  font-family: 'Great Vibes', cursive; font-size: 48px; color: #ff4d6d;
  text-shadow: 0 0 15px rgba(255,77,109,0.6);
}
input {
  padding: 12px 15px; font-size: 16px; border-radius: 12px; border: none; outline: none;
  background: rgba(255,255,255,0.08); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  color: #ff4d6d; text-align: center;
  box-shadow: 0 0 10px rgba(255,255,255,0.2), 0 0 20px rgba(255,105,180,0.3);
  text-shadow: 0 0 8px rgba(255,77,109,0.8); transition: 0.3s;
}
input:focus { box-shadow: 0 0 15px #ff4d6d, 0 0 30px #ff69b4; }
input::placeholder { color: #ff85a2; opacity: 0.7; }
button { padding: 10px 20px; border-radius: 10px; background: pink; border: none; cursor: pointer; font-size: 16px; }

/* MATRIX */
#matrix-phase { position: absolute; inset: 0; display: none; z-index: 50; }
#countdown-num {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: 120px; color: #ff69b4; z-index: 60; opacity: 0;
  text-shadow: 0 0 20px #ff1493, 0 0 50px #ff69b4;
}

/* RAIN EFFECT */
.heart { position: absolute; animation: fall 5s linear forwards; }
@keyframes fall { to { transform: translateY(110vh); opacity: 0; } }
.wish {
  position: absolute; font-family: 'Great Vibes'; color: #ff85c1;
  text-shadow: 0 0 10px #ff1493, 0 0 30px #ff69b4;
}

/* GALAXY CANVAS */
.webgl { position: fixed; inset: 0; display: none; z-index: 1; }

/* GALAXY NEXT BUTTON */
#galaxyNext {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-family: 'Great Vibes', cursive; font-size: 52px; color: #ff69b4;
  text-shadow: 0 0 15px #ff1493, 0 0 35px #ff69b4, 0 0 60px #ff4d6d;
  opacity: 0; cursor: pointer; z-index: 99; display: none; transition: opacity 1s;
}
#galaxyNext.show { opacity: 1; }

/* ═══════════════════════════════
   INVITATION CARD SCREEN
═══════════════════════════════ */
#invitation-screen {
  position: fixed; inset: 0;
  background: #0a0a0a;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 200;
}
#invitation-screen.active { display: flex; }

/* Envelope wrapper */
#envelope-wrap {
  position: relative;
  width: min(300px, 82vw);
  height: 380px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}

/* Envelope body */
#env-body {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 220px;
  background: #c4a882;
  border-radius: 4px 4px 10px 10px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  z-index: 1;
  overflow: hidden;
}
/* Envelope V-fold lines */
#env-body::before {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 100%;
  background:
    linear-gradient(135deg, #b8976e 50%, transparent 50%),
    linear-gradient(225deg, #b8976e 50%, transparent 50%);
  background-size: 50% 100%;
  background-position: left, right;
  background-repeat: no-repeat;
  opacity: 0.5;
}

/* Envelope flap */
#env-flap {
  position: absolute;
  bottom: 220px;
  width: 100%;
  height: 130px;
  transform-origin: bottom center;
  transform: rotateX(0deg);
  transition: transform 0.9s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 3;
  perspective: 600px;
}
#env-flap::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: #b8976e;
  clip-path: polygon(0% 100%, 50% 0%, 100% 100%);
  border-radius: 2px;
  box-shadow: 0 -2px 8px rgba(0,0,0,0.2);
}
#env-flap.open {
  transform: rotateX(-170deg);
  z-index: 0;
}

/* The card itself */
#invite-card {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 20px);
  background: linear-gradient(160deg, #f5e6d3 0%, #ede0cc 60%, #e8d5b7 100%);
  border-radius: 6px;
  padding: 20px 18px 18px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  z-index: 2;
  text-align: center;
  transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.6s;
  opacity: 0;
  transform: translateX(-50%) translateY(0px);
  box-sizing: border-box;
}
#invite-card.rise {
  opacity: 1;
  transform: translateX(-50%) translateY(-130px);
}

/* Card content */
.card-deco {
  font-size: 13px;
  letter-spacing: 3px;
  color: #8a7055;
  text-transform: uppercase;
  margin-bottom: 6px;
  font-family: 'Cormorant Garamond', serif;
}
.card-title {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(22px, 6vw, 30px);
  color: #2a1a0a;
  margin: 4px 0 10px;
  line-height: 1.2;
}
.card-divider {
  width: 60px; height: 1px;
  background: linear-gradient(90deg, transparent, #8a7055, transparent);
  margin: 0 auto 14px;
}
.card-body {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(13px, 3.5vw, 15px);
  color: #3a2a18;
  line-height: 1.85;
  font-style: italic;
  text-align: center;
}
.card-date {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(12px, 3vw, 14px);
  color: #5a4030;
  margin-top: 12px;
  letter-spacing: 1px;
}
.card-footer {
  display: flex;
  justify-content: flex-end;
  margin-top: 18px;
}
#lets-go {
  font-family: 'Great Vibes', cursive;
  font-size: clamp(22px, 5vw, 28px);
  color: #5a3820;
  border: 1px solid #c4a882;
  padding: 6px 18px;
  border-radius: 40px;
  cursor: pointer;
  background: rgba(196,168,130,0.15);
  transition: background 0.3s, color 0.3s;
  opacity: 0;
  transition: opacity 0.6s, background 0.3s;
}
#lets-go.show { opacity: 1; }
#lets-go:hover { background: rgba(196,168,130,0.35); color: #2a1a0a; }

/* small wax seal deco */
.wax-seal {
  font-size: 22px;
  margin-bottom: 4px;
  display: block;
}
/* ═══ MUSEUM DOOR SCREEN ═══ */
#door-screen {
  position: fixed; inset: 0;
  background: #12100a;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 400;
  overflow: hidden;
}
#door-screen.active { display: flex; }
#door-bg {
  position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 38px, rgba(255,255,255,0.03) 38px, rgba(255,255,255,0.03) 40px), repeating-linear-gradient(90deg, transparent, transparent 58px, rgba(255,255,255,0.02) 58px, rgba(255,255,255,0.02) 60px);
  background-color: #1a1610;
}
#door-bg::after { content:""; position:absolute; top:-20%; left:50%; transform:translateX(-50%); width:60%; height:60%; background:radial-gradient(ellipse, rgba(196,163,90,0.12) 0%, transparent 70%); pointer-events:none; }
#museum-sign { position:absolute; top:clamp(28px,7vh,55px); left:50%; transform:translateX(-50%); font-family:"Cormorant Garamond",serif; font-size:clamp(12px,3vw,18px); letter-spacing:5px; color:#c4a35a; text-transform:uppercase; white-space:nowrap; opacity:0; transition:opacity 0.8s; }
#museum-sign.show { opacity:1; }
#door-container { position:relative; width:min(220px,52vw); height:min(370px,64vh); perspective:900px; perspective-origin:50% 50%; flex-shrink:0; }
#door-arch { position:absolute; inset:0; border:3px solid #c4a35a; border-radius:min(110px,26vw) min(110px,26vw) 0 0; box-shadow:0 0 0 5px #1a1610, 0 0 0 8px #c4a35a, 0 0 25px rgba(196,163,90,0.3); z-index:1; pointer-events:none; }
#door-arch::before { content:"✦"; position:absolute; top:clamp(10px,2vw,16px); left:50%; transform:translateX(-50%); color:#c4a35a; font-size:clamp(13px,2.5vw,18px); }
#door-clip { position:absolute; inset:0; border-radius:min(110px,26vw) min(110px,26vw) 0 0; overflow:hidden; display:flex; }
#door-void { position:absolute; inset:0; background:radial-gradient(ellipse at 50% 40%, #1a0f05 0%, #000 100%); border-radius:inherit; }
#door-left { position:absolute; left:0; top:0; width:50%; height:100%; transform-origin:left center; transform:rotateY(0deg); transition:transform 1.4s cubic-bezier(0.4,0,0.2,1); transform-style:preserve-3d; z-index:2; }
#door-right { position:absolute; right:0; top:0; width:50%; height:100%; transform-origin:right center; transform:rotateY(0deg); transition:transform 1.4s cubic-bezier(0.4,0,0.2,1); transform-style:preserve-3d; z-index:2; }
#door-left.open  { transform:rotateY(-82deg); }
#door-right.open { transform:rotateY(82deg); }
.door-face { position:absolute; inset:0; background:linear-gradient(108deg,#6b3f1e 0%,#4a2810 40%,#3a1f0c 100%); backface-visibility:hidden; }
.door-face::before { content:""; position:absolute; inset:0; background:repeating-linear-gradient(175deg, transparent 0px, transparent 6px, rgba(0,0,0,0.08) 6px, rgba(0,0,0,0.08) 7px); }
.door-panel-deco { position:absolute; left:10%; right:10%; border:1.5px solid rgba(196,163,90,0.4); border-radius:3px; }
.door-panel-deco.top    { top:6%; height:30%; }
.door-panel-deco.bottom { top:40%; height:52%; }
#handle-left  { position:absolute; right:10%; top:50%; transform:translateY(-50%); width:9px; height:32px; background:linear-gradient(180deg,#d4a93a,#8a6520); border-radius:5px; box-shadow:1px 1px 4px rgba(0,0,0,0.5); z-index:3; }
#handle-right { position:absolute; left:10%;  top:50%; transform:translateY(-50%); width:9px; height:32px; background:linear-gradient(180deg,#d4a93a,#8a6520); border-radius:5px; box-shadow:-1px 1px 4px rgba(0,0,0,0.5); z-index:3; }
#door-zoom { position:absolute; top:50%; left:50%; width:12px; height:12px; background:#000; border-radius:50%; transform:translate(-50%,-50%) scale(1); transition:transform 0.8s ease-in; z-index:10; pointer-events:none; opacity:0; }
#door-zoom.expand { opacity:1; transform:translate(-50%,-50%) scale(280); }
#canva-screen { position:fixed; inset:0; display:none; z-index:500; background:#000; }
#canva-screen iframe { width:100%; height:100%; border:none; }
</style>
</head>

<canvas class="webgl"></canvas>

<div id="login">

<!-- ═══ INVITATION SCREEN ═══ -->

      <span class="wax-seal">✦</span>

<!-- ═══ INVITATION LOGIC ═══ -->
<script>
function showInvitation() {
  /* Hide galaxy */
  var gn = document.getElementById('galaxyNext');
  gn.classList.remove('show');
  setTimeout(function(){ gn.style.display='none'; }, 600);

  var canvas = document.querySelector('.webgl');
  canvas.style.transition = 'opacity 0.8s';
  canvas.style.opacity = '0';

  /* Stop galaxy music — NO invitation music yet, wait for let's go */
  var m = document.getElementById('music');
  m.style && (m.volume = 0);
  setTimeout(function(){
    m.pause();
  }, 800);

  /* Show invitation screen */
  setTimeout(function(){
    var scr = document.getElementById('invitation-screen');
    scr.classList.add('active');
    /* Step 1: flap opens */
    setTimeout(function(){
      document.getElementById('env-flap').classList.add('open');
    }, 600);
    /* Step 2: card rises */
    setTimeout(function(){
      document.getElementById('invite-card').classList.add('rise');
    }, 1500);
    /* Step 3: let's go appears */
    setTimeout(function(){
      document.getElementById('lets-go').classList.add('show');
    }, 3000);
  }, 800);
}

function goToNextPart() {
  /* Start song3.mp3 */
  var m3 = document.getElementById('music3');
  m3.volume = 0;
  m3.play().catch(function(){});
  var v = 0;
  var fi = setInterval(function(){
    if(v < 1){ v += 0.06; m3.volume = Math.min(v, 1); }
    else clearInterval(fi);
  }, 150);

  /* Fade out invitation */
  var inv = document.getElementById('invitation-screen');
  inv.style.transition = 'opacity 0.6s';
  inv.style.opacity = '0';

  setTimeout(function(){
    inv.style.display = 'none';

    /* Show door screen */
    var ds = document.getElementById('door-screen');
    ds.classList.add('active');

    /* Sign fade in */
    setTimeout(function(){
      document.getElementById('museum-sign').classList.add('show');
    }, 400);

    /* Door opens */
    setTimeout(function(){
      document.getElementById('door-left').classList.add('open');
      document.getElementById('door-right').classList.add('open');
    }, 900);

    /* Zoom in through door */
    setTimeout(function(){
      document.getElementById('door-zoom').classList.add('expand');
    }, 2500);

    /* Show  */
    setTimeout(function(){
      ds.style.display = 'none';
      var cs = document.getElementById('canva-screen');
      cs.style.display = 'block';
      /* Masukkan link Canva kau kat sini */
      document.getElementById('canva-iframe').src = 'https://canva.link/4lqzx7udhpybuz5';
    }, 3200);

  }, 600);
}
</script>

<!-- ═══ GALAXY ═══ -->
<script>
var galaxyStarted = false;

function startGalaxy() {
  if (galaxyStarted) return;
  galaxyStarted = true;

  var canvas = document.querySelector('.webgl');
  canvas.style.display = 'block';
  canvas.style.opacity = '1';

  var scene = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 500);
  camera.position.set(0, 7, 44);

  var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setClearColor('#00000a');

  /* ⭐ BINTANG */
  var sPos = new Float32Array(15000);
  for (var i=0;i<15000;i++) sPos[i]=(Math.random()-0.5)*400;
  var sGeo = new THREE.BufferGeometry();
  sGeo.setAttribute('position',new THREE.BufferAttribute(sPos,3));
  scene.add(new THREE.Points(sGeo,new THREE.PointsMaterial({color:0xffffff,size:0.15,transparent:true,opacity:0.7})));

  /* 🌀 SPIRAL */
  var count = 80000;
  var positions = new Float32Array(count*3);
  var colors = new Float32Array(count*3);
  for (var i=0;i<count;i++) {
    var i3=i*3, branch=i%3, t=i/count;
    var radius=Math.pow(t,0.5)*14;
    var angle=(branch/3)*Math.PI*2+radius*1.8;
    var scatter=Math.pow(Math.random(),3)*(Math.random()<0.5?1:-1);
    var scatterY=Math.pow(Math.random(),3)*(Math.random()<0.5?1:-1);
    positions[i3]  =Math.cos(angle)*radius+scatter*Math.max(0,1.5-radius*0.05);
    positions[i3+1]=scatterY*0.55;
    positions[i3+2]=Math.sin(angle)*radius+scatter*Math.max(0,1.5-radius*0.05);
  }
  for (var i=0;i<count;i++) {
    var i3=i*3, x=positions[i3], z=positions[i3+2];
    var r=Math.sqrt(x*x+z*z), c=new THREE.Color();
    if(Math.random()<0.04) c.set('#ffffff');
    else if(r<2) c.setHSL(0.08,1.0,0.75);
    else if(r<5) c.setHSL(0.85+Math.random()*0.05,0.9,0.65);
    else c.setHSL(0.83+Math.random()*0.08,0.8,0.55+Math.random()*0.2);
    colors[i3]=c.r; colors[i3+1]=c.g; colors[i3+2]=c.b;
  }
  var geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(positions,3));
  geo.setAttribute('color',new THREE.BufferAttribute(colors,3));
  var galaxy=new THREE.Points(geo,new THREE.PointsMaterial({
    size:0.048,vertexColors:true,blending:THREE.AdditiveBlending,
    depthWrite:false,transparent:true,opacity:0.95
  }));
  scene.add(galaxy);

  /* ❤️ HEART TENGAH */
  function heartXY(t) {
    return {
      x:16*Math.pow(Math.sin(t),3)*0.11,
      y:(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t))*0.11
    };
  }
  var hCount=8000, hPos=new Float32Array(hCount*3), hCol=new Float32Array(hCount*3);
  for (var i=0;i<hCount;i++) {
    var i3=i*3, t=Math.random()*Math.PI*2, r=Math.pow(Math.random(),0.4);
    var p=heartXY(t), noise=(1-r)*0.28;
    hPos[i3]=p.x*r+(Math.random()-0.5)*noise;
    hPos[i3+1]=p.y*r+(Math.random()-0.5)*noise;
    hPos[i3+2]=(Math.random()-0.5)*0.7*r;
    var c=new THREE.Color();
    if(Math.random()<0.05) c.set('#ffffff');
    else c.setHSL(0.0+Math.random()*0.02,1.0,(0.5+Math.random()*0.4)*0.65);
    hCol[i3]=c.r; hCol[i3+1]=c.g; hCol[i3+2]=c.b;
  }
  var hGeo=new THREE.BufferGeometry();
  hGeo.setAttribute('position',new THREE.BufferAttribute(hPos,3));
  hGeo.setAttribute('color',new THREE.BufferAttribute(hCol,3));
  var heartCenter=new THREE.Points(hGeo,new THREE.PointsMaterial({
    size:0.07,vertexColors:true,blending:THREE.AdditiveBlending,
    depthWrite:false,transparent:true,opacity:1.0
  }));
  scene.add(heartCenter);
  var heartHitbox=new THREE.Mesh(
    new THREE.SphereGeometry(1.4,8,8),
    new THREE.MeshBasicMaterial({transparent:true,opacity:0,depthWrite:false})
  );
  scene.add(heartHitbox);

  /* ✍️ TEKS */
  function makeText(l1,l2) {
    var c=document.createElement('canvas');
    c.width=1024; c.height=220;
    var ctx=c.getContext('2d');
    ctx.clearRect(0,0,1024,220);
    ctx.textAlign='center';
    ctx.shadowColor='#ff69b4'; ctx.shadowBlur=30;
    ctx.fillStyle='rgba(255,255,255,0.92)';
    ctx.font='bold 80px serif';
    ctx.fillText(l1,512,92);
    ctx.fillStyle='rgba(255,180,210,0.88)';
    ctx.font='66px serif';
    ctx.fillText(l2,512,182);
    var m=new THREE.Mesh(
      new THREE.PlaneGeometry(28,6.5),
      new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(c),transparent:true,depthWrite:false,opacity:0})
    );
    return m;
  }
  var textMesh=makeText('Happy Birthday Sayang 🎂','I Love You So Much ❤️');
  textMesh.position.set(0,13,-6);
  scene.add(textMesh);
  var textOpacity=0, textActive=false, textFadeOut=false;

  /* 📸 40 GAMBAR */
  var loader=new THREE.TextureLoader();
  var imgGroups=[];
  var imgSrcs=['pic1.jpg','pic2.jpg','pic3.jpg','pic4.jpg'];
  var allSrcs=[];
  imgSrcs.forEach(function(s){for(var k=0;k<10;k++) allSrcs.push(s);});
  allSrcs.forEach(function(src){
    var tex=loader.load(src);
    var sz=0.75+Math.random()*0.5;
    var glowMesh=new THREE.Mesh(
      new THREE.PlaneGeometry(sz+0.22,sz+0.22),
      new THREE.MeshBasicMaterial({color:0xff69b4,transparent:true,opacity:0.48,
        blending:THREE.AdditiveBlending,depthWrite:false})
    );
    var imgMesh=new THREE.Mesh(
      new THREE.PlaneGeometry(sz,sz),
      new THREE.MeshBasicMaterial({map:tex,transparent:true,opacity:0.92,depthWrite:false})
    );
    imgMesh.position.z=0.01;
    var group=new THREE.Group();
    group.add(glowMesh); group.add(imgMesh);
    var rIdx=Math.floor(Math.random()*(count-1));
    group.position.set(positions[rIdx*3],positions[rIdx*3+1],positions[rIdx*3+2]);
    scene.add(group);
    imgGroups.push(group);
  });

  /*
    ZOOM FLOW (waktu dari startGalaxy dipanggil):
    0s   : zoom in ke heart, lerp 0.030
    ~3s  : tiba dekat heart — STAY 1.5s
    4.5s : zoom out + boomerang arc (sine curve)
    8.5s : zoom masuk spiral, teks fade out
    12.5s: stay, rotate start
    22.5s: zoom laju ke heart
    24s  : next pop
  */
  var camPos  = { x:0, y:7,  z:44 };
  var camLook = { x:0, y:0,  z:0  };
  var curPos  = { x:0, y:7,  z:44 };
  var curLook = { x:0, y:0,  z:0  };
  var lerpSpeed = 0.030;
  var rotSpeed=0, rotY=0;
  var arcActive=false, arcStart=0;

  /* Phase 1 — zoom in ke heart */
  camPos.z=1.8; camPos.y=0; camPos.x=0;

  /* Phase 2 (4.5s) — zoom out + boomerang arc */
  setTimeout(function(){
    lerpSpeed=0.013;
    camPos.z=46; camPos.y=9;
    arcActive=true; arcStart=Date.now();
    textActive=true;
  },4500);

  /* Phase 3 (8.5s) — zoom masuk spiral */
  setTimeout(function(){
    arcActive=false;
    camPos.x=0; camLook.x=0; camLook.y=0;
    lerpSpeed=0.010;
    camPos.z=9; camPos.y=0.5;
    textFadeOut=true;
  },8500);

  /* Phase 4 (12.5s) — stay, rotate start */
  setTimeout(function(){
    rotSpeed=0.005;
  },12500);

  /* Phase 5 (22.5s) — zoom laju ke heart */
  setTimeout(function(){
    lerpSpeed=0.035;
    camPos.z=1.5; camPos.y=0; camPos.x=0;
    camLook.x=0; camLook.y=0;
  },22500);

  /* Phase 6 (24s) — next pop */
  setTimeout(function(){
    var gn=document.getElementById('galaxyNext');
    gn.style.display='block';
    setTimeout(function(){ gn.classList.add('show'); },100);
  },24000);

  /* 🤏 PINCH ZOOM */
  var lastPinch=null;
  canvas.addEventListener('touchstart',function(e){
    if(e.touches.length===2)
      lastPinch=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
        e.touches[0].clientY-e.touches[1].clientY);
  },{passive:true});
  canvas.addEventListener('touchmove',function(e){
    if(e.touches.length===2 && lastPinch){
      var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,
        e.touches[0].clientY-e.touches[1].clientY);
      camPos.z=Math.max(1.2,Math.min(60,camPos.z+(lastPinch-d)*0.07));
      lastPinch=d;
    }
  },{passive:true});
  canvas.addEventListener('touchend',function(){lastPinch=null;},{passive:true});
  canvas.addEventListener('wheel',function(e){
    camPos.z=Math.max(1.2,Math.min(60,camPos.z+e.deltaY*0.015));
  },{passive:true});

  /* 🎯 TAP */
  var raycaster=new THREE.Raycaster(), mouse=new THREE.Vector2();
  var allImgMeshes=[];
  imgGroups.forEach(function(g){allImgMeshes.push(g.children[1]);});
  function onTap(cx,cy){
    if(canvas.style.display!=='block') return;
    mouse.x=(cx/innerWidth)*2-1;
    mouse.y=-(cy/innerHeight)*2+1;
    raycaster.setFromCamera(mouse,camera);
    if(raycaster.intersectObject(heartHitbox).length>0){showInvitation();return;}
    var hit=raycaster.intersectObjects(allImgMeshes);
    if(hit.length>0) spawnLove(hit[0].object.getWorldPosition(new THREE.Vector3()));
  }
  window.addEventListener('click',function(e){onTap(e.clientX,e.clientY);});
  canvas.addEventListener('touchend',function(e){
    if(e.changedTouches.length===1 && !lastPinch)
      onTap(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
  },{passive:true});

  function spawnLove(pos){
    for(var i=0;i<5;i++){
      var div=document.createElement('div');
      div.innerHTML='I love you ❤️';
      div.style.cssText='position:fixed;color:#ff69b4;font-family:Great Vibes,cursive;font-size:26px;text-shadow:0 0 10px #ff1493;pointer-events:none;z-index:99;';
      document.body.appendChild(div);
      var v=pos.clone().project(camera);
      var x=(v.x*0.5+0.5)*innerWidth+(Math.random()-0.5)*80;
      var y=(-v.y*0.5+0.5)*innerHeight+(Math.random()-0.5)*80;
      div.style.left=x+'px'; div.style.top=y+'px'; div.style.opacity=1;
      var up=0;
      (function(d,y0){
        var a=setInterval(function(){
          up++; d.style.top=(y0-up)+'px'; d.style.opacity-=0.018;
          if(d.style.opacity<=0){clearInterval(a);d.remove();}
        },16);
      })(div,y);
    }
  }

  /* 🔁 ANIMATE */
  function animate(){
    requestAnimationFrame(animate);

    /* Boomerang arc — sin(t*π) naturally goes 0→1→0 */
    if(arcActive){
      var elapsed=Date.now()-arcStart;
      var t=Math.min(elapsed/4000,1);
      camPos.x=Math.sin(t*Math.PI)*-20;
      camLook.x=Math.sin(t*Math.PI)*-9;
      camLook.y=Math.sin(t*Math.PI)*2;
    }

    curPos.x += (camPos.x-curPos.x)*lerpSpeed;
    curPos.y += (camPos.y-curPos.y)*lerpSpeed;
    curPos.z += (camPos.z-curPos.z)*lerpSpeed;
    curLook.x += (camLook.x-curLook.x)*lerpSpeed;
    curLook.y += (camLook.y-curLook.y)*lerpSpeed;
    camera.position.set(curPos.x,curPos.y,curPos.z);
    camera.lookAt(curLook.x,curLook.y,curLook.z);

    rotY+=rotSpeed;
    galaxy.rotation.y=rotY;
    heartCenter.rotation.y=rotY;
    imgGroups.forEach(function(g){
      var ox=g.position.x, oz=g.position.z;
      var cos=Math.cos(rotSpeed), sin=Math.sin(rotSpeed);
      g.position.x=ox*cos-oz*sin;
      g.position.z=ox*sin+oz*cos;
      g.lookAt(camera.position);
    });

    var pulse=1+Math.sin(Date.now()*0.003)*0.09;
    heartCenter.scale.set(pulse,pulse,pulse);

    if(textActive && !textFadeOut && textOpacity<1){
      textOpacity+=0.006;
      textMesh.material.opacity=Math.min(textOpacity,1);
    }
    if(textFadeOut && textOpacity>0){
      textOpacity-=0.01;
      textMesh.material.opacity=Math.max(textOpacity,0);
    }

    renderer.render(scene,camera);
  }
  animate();

  window.addEventListener('resize',function(){
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth,innerHeight);
  });
}
</script>

<!-- ═══ MATRIX + RAIN (auto goNext after 20s) ═══ -->
<script>
function check(){
  if(pass.value==='111498'){ login.style.display='none'; startMatrix(); }
}

function startMatrix(){
  var phase=document.getElementById('matrix-phase');
  phase.style.display='block';
  var canvas=document.getElementById('matrixCanvas');
  var ctx=canvas.getContext('2d');
  canvas.width=innerWidth; canvas.height=innerHeight;
  var chars='アイウエオ0123456789♥';
  var size=14, columns=canvas.width/size;
  var drops=Array.from({length:columns},function(){return Math.random()*-50;});
  var interval=setInterval(function(){
    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#ff69b4"; ctx.font=size+"px monospace";
    drops.forEach(function(y,i){
      ctx.fillText(chars[Math.random()*chars.length|0],i*size,y*size);
      if(y*size>canvas.height && Math.random()>0.97) drops[i]=Math.random()*-20;
      drops[i]++;
    });
  },33);
  setTimeout(function(){
    runCountdown(3,function(){
      clearInterval(interval);
      phase.style.display='none';
      startEffect();
      fadeMusic();
    });
  },1500);
}

function runCountdown(n,cb){
  var el=document.getElementById('countdown-num');
  function show(num,done){
    el.textContent=num; el.style.opacity=1;
    setTimeout(function(){ el.style.opacity=0; setTimeout(done,300); },700);
  }
  function next(){ if(n<1) return cb(); show(n--,function(){setTimeout(next,200);}); }
  next();
}

function fadeMusic(){
  var m=document.getElementById('music');
  m.volume=0;
  m.play().catch(function(){});
  var v=0;
  var i=setInterval(function(){
    if(v<1){ v+=0.05; m.volume=Math.min(v,1); } else clearInterval(i);
  },200);
}

var rainImg,rainHeart,rainWish;

function startEffect(){
  var images=['pic1.jpg','pic2.jpg','pic3.jpg','pic4.jpg'];

  rainImg=setInterval(function(){
    var img=document.createElement('img');
    img.src=images[Math.random()*images.length|0];
    img.style.cssText='position:absolute;top:-100px;animation:fall 5s linear;';
    img.style.left=Math.random()*100+'%';
    img.style.width=(Math.random()*80+50)+'px';
    document.body.appendChild(img);
    setTimeout(function(){img.remove();},5000);
  },300);

  rainHeart=setInterval(function(){
    var h=document.createElement("div");
    h.className="heart"; h.innerHTML="❤️";
    h.style.left=Math.random()*100+"%";
    document.body.appendChild(h);
    setTimeout(function(){h.remove();},5000);
  },200);

  rainWish=setInterval(function(){
    var t=document.createElement('div');
    t.className='wish'; t.innerHTML='happy birthday sayang ♥️';
    t.style.left=Math.random()*100+'%'; t.style.top=Math.random()*80+'%';
    document.body.appendChild(t);
    setTimeout(function(){t.remove();},4000);
  },500);

  /* ← Auto pergi galaxy selepas 20 saat, tiada button next */
  setTimeout(function(){ goNext(); },20000);
}

function goNext(){
  clearInterval(rainImg); clearInterval(rainHeart); clearInterval(rainWish);
  document.querySelectorAll('.heart,.wish,img').forEach(function(el){el.remove();});
  document.querySelector('.webgl').style.display='block';
  document.body.style.background="black";
  /* Lagu terus sambung — tak perlu restart, sama audio element */
  setTimeout(function(){ startGalaxy(); },200);
}
</script>
