<!DOCTYPE html> 

<html>
<head>
  <title>For my beautiful girl ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #1a001a, #000000);
      overflow: hidden;
      color: white;
      font-family: 'Poppins', sans-serif;
      text-align: center;
    }

    .webgl {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      z-index: 1;
    }

    #login {
      position: absolute;
      top: 40%;
      width: 100%;
      z-index: 10;
    }

    h2 {
      font-family: 'Great Vibes', cursive;
      font-size: 48px;
      color: #ff4d6d;
    }

    input {
      padding: 12px;
      border-radius: 10px;
      border: none;
      text-align: center;
    }

    button {
      padding: 10px 20px;
      border-radius: 10px;
      background: pink;
      cursor: pointer;
    }

    #matrix-phase {
      position: absolute;
      inset: 0;
      display: none;
      z-index: 50;
    }

    canvas {
      width: 100%;
      height: 100%;
    }

    #countdown-num {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 120px;
      color: #ff69b4;
      z-index: 60;
      opacity: 0;
    }

    .heart {
      position: absolute;
      animation: fall 5s linear forwards;
    }

    @keyframes fall {
      to { transform: translateY(110vh); opacity: 0; }
    }

    .wish {
      position: absolute;
      color: pink;
      animation: wishPop 4s ease-out forwards;
    }

    @keyframes wishPop {
      0% { opacity: 0; }
      100% { transform: translateY(-60px); opacity: 0; }
    }

    #nextBtn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      font-size: 28px;
      color: #ff69b4;
      opacity: 0;
      transition: 1s;
      z-index: 100;
    }

    #nextBtn.show {
      opacity: 1;
    }
  </style>

</head>

<body>

<canvas class="webgl"></canvas>

<div id="login">
  <h2>Only For Birthday Girl 💌</h2>
  <input type="password" id="pass">
  <br><br>
  <button onclick="check()">Open 💖</button>
</div>

<div id="matrix-phase">
  <canvas id="matrixCanvas"></canvas>
</div>

<div id="countdown-num"></div>
<div id="nextBtn" onclick="goNext()">next</div>

<audio id="music" loop>
  <source src="song.mp3">
</audio>

<script type="module">

import * as THREE from 'https://cdn.skypack.dev/three@0.150.0';

const canvas = document.querySelector('.webgl');
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0,0,8);
scene.add(camera);

const renderer = new THREE.WebGLRenderer({ canvas, alpha:true });
renderer.setSize(innerWidth, innerHeight);

// 📸 gambar spiral
const loader = new THREE.TextureLoader();
const images = [
  'pic1.jpg','pic2.jpg','pic3.jpg','pic4.jpg',
  'pic5.jpg','pic6.jpg','pic7.jpg','pic8.jpg',
  'pic9.jpg','pic10.jpg'
];

const points = [];

images.forEach((img,i)=>{
  const tex = loader.load(img);
  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(1.5,1.5),
    new THREE.MeshBasicMaterial({ map: tex })
  );

  const angle = i * 0.6;
  const radius = 2 + i * 0.5;

  mesh.position.x = Math.cos(angle)*radius;
  mesh.position.z = Math.sin(angle)*radius;
  mesh.position.y = (i-5)*0.4;

  scene.add(mesh);
  points.push(mesh.position);
});

let current = 0;

function moveCamera(){
  const target = points[current];
  const start = performance.now();
  const startPos = camera.position.clone();

  function anim(t){
    let p = (t-start)/2000;
    if(p<1){
      camera.position.lerpVectors(startPos,target,p);
      camera.lookAt(target);
      requestAnimationFrame(anim);
    } else {
      current = (current+1)%points.length;
      setTimeout(moveCamera,800);
    }
  }
  requestAnimationFrame(anim);
}

window.startGalaxy = () => {
  moveCamera();
};

function tick(){
  renderer.render(scene,camera);
  requestAnimationFrame(tick);
}
tick();

</script>

<script>
function check() {
  if (document.getElementById('pass').value === '111498') {
    document.getElementById('login').style.display = 'none';
    startMatrix();
  }
}

/* MATRIX + COUNTDOWN (UNCHANGED FLOW) */
function startMatrix() {
  const phase = document.getElementById('matrix-phase');
  phase.style.display = 'block'; 
  const canvas = document.getElementById('matrixCanvas');
  const ctx = canvas.getContext('2d');

  canvas.width = innerWidth;
  canvas.height = innerHeight;

  const chars = '♥0123456789';
  const drops = Array(canvas.width/14).fill(1);

  const interval = setInterval(()=>{
    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#ff69b4";
    ctx.font="14px monospace";

    drops.forEach((y,i)=>{
      ctx.fillText(chars[Math.random()*chars.length|0], i*14, y*14);
      if(y*14>canvas.height) drops[i]=0;
      drops[i]++;
    });
  },33);

  setTimeout(()=>{
    clearInterval(interval);
    document.getElementById('matrix-phase').style.display='none';
    startEffect();
    fadeMusic();
  },3000);
}

function fadeMusic(){
  const m=document.getElementById('music');
  m.volume=0; m.play();
  let v=0;
  const i=setInterval(()=>{
    if(v<1){v+=0.05;m.volume=v;} else clearInterval(i);
  },200);
}

/* EFFECT ORIGINAL KAU */
function startEffect(){
  const images=['pic1.jpg','pic2.jpg','pic3.jpg','pic4.jpg'];

  setInterval(()=>{
    const img=document.createElement('img');
    img.src=images[Math.random()*images.length|0];
    img.style.position='absolute';
    img.style.top='-100px';
    img.style.left=Math.random()*100+'%';
    img.style.width=(Math.random()*80+50)+'px';
    img.style.animation='fall 5s linear';
    document.body.appendChild(img);
    setTimeout(()=>img.remove(),5000);
  },300);

  setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"%";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
  },200);

  setInterval(()=>{
    const t=document.createElement('div');
    t.className='wish';
    t.innerHTML='happy birthday sayang ♥️';
    t.style.left=Math.random()*100+'%';
    t.style.top=Math.random()*80+'%';
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),4000);
  },500);

  setTimeout(()=>{
    document.getElementById('nextBtn').classList.add('show');
  },10000);
}

/* 👉 NEXT → GALAXY CINEMATIC */
function goNext(){
  document.querySelectorAll('.heart, .wish, img').forEach(el=>el.remove());
  document.getElementById('nextBtn').style.display='none';
  document.querySelector('.webgl').style.display='block';

  startGalaxy();
}
</script>

</body>
</html>
