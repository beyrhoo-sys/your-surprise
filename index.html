<!DOCTYPE html>
<html>
<head>
  <title>For my beautiful girl ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #000;
      overflow: hidden;
      color: white;
      font-family: 'Poppins', sans-serif;
      text-align: center;
    }

    #login {
      position: absolute;
      top: 40%;
      width: 100%;
      z-index: 1000;
      display: block;
    }

    h2 {
      font-family: 'Great Vibes', cursive;
      font-size: 48px;
      color: #ff4d6d;
      text-shadow: 0 0 15px rgba(255, 77, 109, 0.6);
    }

    input {
      padding: 12px 15px;
      font-size: 16px;
      border-radius: 12px;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: #ff4d6d;
      text-align: center;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 10px rgba(255,255,255,0.2);
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(45deg, #ff4d6d, #ff85a2);
      color: white;
      cursor: pointer;
      margin-top: 20px;
    }

    /* ── MATRIX & ELEMENTS ── */
    #matrix-phase {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 50;
    }

    canvas#matrixCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #countdown-num {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 150px;
      font-weight: 900;
      color: #ff69b4;
      z-index: 60;
      opacity: 0;
      pointer-events: none;
    }

    .heart, .falling-img, .falling-text {
      position: absolute;
      pointer-events: none;
      z-index: 5;
    }

    .falling-text {
      font-family: 'Great Vibes', cursive;
      color: #ff4d6d;
      text-shadow: 0 0 10px rgba(255, 77, 109, 0.5);
      white-space: nowrap;
    }

    @keyframes fall {
      0% { transform: translateY(-20vh) rotate(0deg); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    @keyframes fallText {
      0% { transform: translateY(-20vh); opacity: 0; }
      15% { opacity: 1; }
      100% { transform: translateY(110vh); opacity: 0; }
    }
  </style>
</head>
<body>

<div id="login">
  <h2>Only For Birthday Girl 💌</h2>
  <input type="password" id="pass" placeholder="Enter password...">
  <br>
  <button onclick="check()">Open 💖</button>
</div>

<div id="matrix-phase">
  <canvas id="matrixCanvas"></canvas>
</div>

<div id="countdown-num"></div>

<audio id="music" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
const heartEmojis = ['❤️','💓','💖','💘', '✨'];

function check() {
  const p = document.getElementById('pass').value;
  if (p === '111498') {
    // Sembunyikan login terus
    document.getElementById('login').style.display = 'none';
    startMatrix();
  } else {
    alert('Wrong password! Cuba lagi sayang.');
  }
}

function startMatrix() {
  const phase = document.getElementById('matrix-phase');
  phase.style.display = 'block';

  const canvas = document.getElementById('matrixCanvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const chars = 'アイウエオカキクケコ0123456789♥♡★';
  const fs = 16;
  let drops = Array.from({ length: Math.floor(window.innerWidth / fs) }, () => Math.random() * -100);

  const matrixInterval = setInterval(() => {
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.font = fs + 'px monospace';
    for (let i = 0; i < drops.length; i++) {
      const text = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillStyle = Math.random() > 0.9 ? '#fff' : '#ff4d6d';
      ctx.fillText(text, i * fs, drops[i] * fs);
      
      if (drops[i] * fs > canvas.height && Math.random() > 0.975) {
        drops[i] = 0;
      }
      drops[i]++;
    }
  }, 35);

  // Countdown mula selepas 1 saat Matrix keluar
  setTimeout(() => {
    runCountdown(3, () => {
      clearInterval(matrixInterval);
      phase.style.display = 'none';
      startEffect();
      fadeInMusic();
    });
  }, 1000);
}

function runCountdown(n, callback) {
  const el = document.getElementById('countdown-num');
  let current = n;

  function next() {
    if (current < 1) {
      el.style.opacity = '0';
      callback();
      return;
    }
    el.textContent = current;
    el.style.opacity = '1';
    el.style.transition = 'none';
    el.style.transform = 'translate(-50%, -50%) scale(2)';
    
    setTimeout(() => {
      el.style.transition = 'all 0.5s ease';
      el.style.transform = 'translate(-50%, -50%) scale(1)';
      el.style.opacity = '0';
    }, 500);

    current--;
    setTimeout(next, 1000);
  }
  next();
}

function fadeInMusic() {
  const music = document.getElementById('music');
  music.volume = 0;
  music.play().then(() => {
    let vol = 0;
    const interval = setInterval(() => {
      if (vol < 1) { vol += 0.1; music.volume = Math.min(vol, 1); }
      else clearInterval(interval);
    }, 200);
  }).catch(() => {});
}

function startEffect() {
  const images = ['pic1.jpg', 'pic2.jpg', 'pic3.jpg'];
  const wishes = ['Happy Birthday Sayang ❤️', 'I Love You So Much'];

  // Gambar jatuh
  setInterval(() => {
    const img = document.createElement('img');
    img.src = images[Math.floor(Math.random() * images.length)];
    img.className = 'falling-img';
    img.style.left = Math.random() * 90 + '%';
    img.style.width = (Math.random() * 80 + 70) + 'px';
    img.style.borderRadius = '15px';
    img.style.animation = `fall ${Math.random() * 2 + 4}s linear forwards`;
    document.body.appendChild(img);
    setTimeout(() => img.remove(), 6000);
  }, 600);

  // Tulisan jatuh
  setInterval(() => {
    const txt = document.createElement('div');
    txt.className = 'falling-text';
    txt.innerHTML = wishes[Math.floor(Math.random() * wishes.length)];
    txt.style.left = Math.random() * 70 + 5 + '%';
    txt.style.fontSize = (Math.random() * 10 + 25) + 'px';
    txt.style.animation = `fallText ${Math.random() * 3 + 5}s linear forwards`;
    document.body.appendChild(txt);
    setTimeout(() => txt.remove(), 8000);
  }, 1500);

  // Love jatuh
  setInterval(() => {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.innerHTML = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
    heart.style.left = Math.random() * 100 + '%';
    heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
    heart.style.animation = `fall ${Math.random() * 2 + 3}s linear forwards`;
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 5000);
  }, 300);
}
</script>
</body>
</html>
