<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For my beautiful girl ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #000;
      overflow: hidden;
      color: white;
      font-family: 'Poppins', sans-serif;
      height: 100vh;
      width: 100vw;
    }

    /* Pastikan login sentiasa di depan sekali sebelum bermula */
    #login {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999; 
      background: radial-gradient(circle at center, #1a001a, #000);
    }

    h2 {
      font-family: 'Great Vibes', cursive;
      font-size: 36px;
      color: #ff4d6d;
      margin-bottom: 20px;
    }

    input {
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: 1px solid #ff4d6d;
      background: rgba(255, 255, 255, 0.1);
      color: #ff4d6d;
      text-align: center;
      outline: none;
    }

    button {
      padding: 12px 30px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      background: #ff4d6d;
      color: white;
      margin-top: 15px;
      cursor: pointer;
    }

    #matrix-phase {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 100;
    }

    canvas { display: block; }

    #countdown-num {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 100px;
      font-weight: bold;
      color: #ff69b4;
      z-index: 200;
      display: none;
    }

    /* Animasi Falling */
    .falling-item {
      position: absolute;
      pointer-events: none;
      z-index: 50;
      animation: fall linear forwards;
    }

    @keyframes fall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body>

<div id="login">
  <h2>Only For Birthday Girl 💌</h2>
  <input type="password" id="pass" placeholder="Password...">
  <button onclick="check()">Open 💖</button>
</div>

<div id="matrix-phase">
  <canvas id="matrixCanvas"></canvas>
</div>

<div id="countdown-num"></div>

<audio id="music" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
const heartEmojis = ['❤️','💓','💖','✨'];
const wishes = ['Happy Birthday Sayang ❤️', 'I Love You', 'Beautiful', 'My Queen 👑'];
const images = ['pic1.jpg', 'pic2.jpg', 'pic3.jpg'];

function check() {
  const p = document.getElementById('pass').value;
  if (p === '111498') {
    document.getElementById('login').style.display = 'none';
    startMatrix();
  } else {
    alert('Salah sayang! Cuba lagi.');
  }
}

function startMatrix() {
  const phase = document.getElementById('matrix-phase');
  phase.style.display = 'block';
  const canvas = document.getElementById('matrixCanvas');
  const ctx = canvas.getContext('2d');

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const chars = '01♥'.split('');
  const fontSize = 16;
  const columns = canvas.width / fontSize;
  const drops = Array(Math.floor(columns)).fill(1);

  const matrixIv = setInterval(() => {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ff4d6d';
    ctx.font = fontSize + 'px monospace';

    for(let i = 0; i < drops.length; i++) {
      const text = chars[Math.floor(Math.random() * chars.length)];
      ctx.fillText(text, i * fontSize, drops[i] * fontSize);
      if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
  }, 35);

  // Mula Countdown
  setTimeout(() => {
    const cd = document.getElementById('countdown-num');
    cd.style.display = 'block';
    let count = 3;
    
    const countIv = setInterval(() => {
      cd.textContent = count;
      cd.style.opacity = '1';
      if(count <= 0) {
        clearInterval(countIv);
        clearInterval(matrixIv);
        phase.style.display = 'none';
        cd.style.display = 'none';
        startFinalEffect();
        playMusic();
      }
      count--;
    }, 1000);
  }, 1000);
}

function playMusic() {
  const music = document.getElementById('music');
  music.play().catch(() => {
    console.log("Audio play deferred");
  });
}

function startFinalEffect() {
  // Hujan Love & Gambar & Tulisan
  setInterval(() => {
    createFallingItem('text', wishes[Math.floor(Math.random() * wishes.length)]);
    createFallingItem('emoji', heartEmojis[Math.floor(Math.random() * heartEmojis.length)]);
    if(Math.random() > 0.5) createFallingItem('image', images[Math.floor(Math.random() * images.length)]);
  }, 500);
}

function createFallingItem(type, content) {
  const item = document.createElement('div');
  item.className = 'falling-item';
  item.style.left = Math.random() * 90 + '%';
  item.style.animationDuration = (Math.random() * 3 + 4) + 's';

  if(type === 'text') {
    item.innerHTML = content;
    item.style.color = '#ff4d6d';
    item.style.fontFamily = 'Great Vibes, cursive';
    item.style.fontSize = '24px';
    item.style.whiteSpace = 'nowrap';
  } else if(type === 'emoji') {
    item.innerHTML = content;
    item.style.fontSize = '20px';
  } else {
    const img = document.createElement('img');
    img.src = content;
    img.style.width = '80px';
    img.style.borderRadius = '10px';
    item.appendChild(img);
  }

  document.body.appendChild(item);
  setTimeout(() => item.remove(), 7000);
}
</script>
</body>
</html>
