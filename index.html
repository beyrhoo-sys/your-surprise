<!DOCTYPE html> 

<html>
<head>
  <title>For my beautiful girl ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #1a001a, #000000);
      overflow: hidden;
      color: white;
      font-family: 'Poppins', sans-serif;
      text-align: center;
    }

    #login {
      position: absolute;
      top: 40%;
      width: 100%;
      transition: opacity 1s;
      z-index: 10;
    }

    h2 {
      font-family: 'Great Vibes', cursive;
      font-size: 48px;
      color: #ff4d6d;
      text-shadow: 0 0 15px rgba(255, 77, 109, 0.6);
      margin-bottom: 20px;
    }

    input {
      padding: 12px 15px;
      font-size: 16px;
      border-radius: 12px;
      border: none;
      outline: none;
      background: rgba(255, 255, 255, 0.1);
      color: #ff4d6d;
      text-shadow: 0 0 8px rgba(255, 77, 109, 0.8);
      backdrop-filter: blur(10px);
      box-shadow: 0 0 10px rgba(255,255,255,0.2);
      text-align: center;
      transition: 0.3s;
    }

    input:focus {
      box-shadow: 0 0 15px #ff4d6d;
    }

    input::placeholder {
      color: #ff85a2;
      opacity: 0.7;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: pink;
      cursor: pointer;
    }

    #matrix-phase {
      position: absolute;
      inset: 0;
      display: none;
      z-index: 50;
    }

    canvas {
      width: 100%;
      height: 100%;
    }

    #countdown-num {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 120px;
      color: #ff69b4;
      z-index: 60;
      opacity: 0;
    }

    .heart {
      position: absolute;
      animation: fall 5s linear forwards;
    }

    @keyframes fall {
      to { transform: translateY(110vh); opacity: 0; }
    }

    .wish {
      position: absolute;
      font-family: 'Great Vibes', cursive;
      color: #ff85c1;
      text-shadow: 0 0 10px #ff1493, 0 0 30px #ff69b4;
      animation: wishPop 4s ease-out forwards;
    }

    @keyframes wishPop {
      0% { opacity: 0; }
      100% { transform: translateY(-60px); opacity: 0; }
    }

    #nextBtn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      font-family: 'Great Vibes', cursive;
      font-size: 28px;
      color: #ff69b4;
      text-shadow: 0 0 10px #ff1493, 0 0 30px #ff69b4;
      opacity: 0;
      transition: 1s;
      z-index: 100;
    }

    #nextBtn.show {
      opacity: 1;
    }

    /* 👉 TAMBAH SAHAJA */
    .webgl {
      position: fixed;
      top: 0;
      left: 0;
      display: none;
      z-index: 1;
    }
  </style>

</head>

<body>

<div id="login">
  <h2>Only For Birthday Girl 💌</h2>
  <input type="password" id="pass">
  <br><br>
  <button onclick="check()">Open 💖</button>
</div>

<div id="matrix-phase">
  <canvas id="matrixCanvas"></canvas>
</div>

<div id="countdown-num"></div>
<div id="nextBtn" onclick="goNext()">next</div>

<audio id="music" loop>
  <source src="song.mp3">
</audio>

<!-- 🌌 TAMBAH GALAXY -->

<canvas class="webgl"></canvas>

<script type="module">
import * as THREE from 'https://cdn.skypack.dev/three@0.150.0';

const webglCanvas = document.querySelector('.webgl');
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 100);

// 👉 START JAUH SIKIT (ZOOM EFFECT)
camera.position.set(0,0,20);
scene.add(camera);

const renderer = new THREE.WebGLRenderer({ canvas: webglCanvas, alpha:true });
renderer.setSize(innerWidth, innerHeight);

const loader = new THREE.TextureLoader();
const images = [
  'pic1.jpg','pic2.jpg','pic3.jpg','pic4.jpg'
]; // guna yang ada je dulu

const points = [];

images.forEach((img,i)=>{
  const tex = loader.load(img);
  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(1.5,1.5),
    new THREE.MeshBasicMaterial({ map: tex })
  );

  const angle = i * 0.8;
  const radius = 2 + i * 0.6;

  mesh.position.x = Math.cos(angle)*radius;
  mesh.position.z = Math.sin(angle)*radius;
  mesh.position.y = (i-2)*0.5;

  scene.add(mesh);
  points.push(mesh.position);
});

let started = false;
let current = 0;

// 🎥 SMOOTH CAMERA MOVE
function moveCamera(){
  const target = points[current];
  const start = performance.now();
  const startPos = camera.position.clone();

  function anim(t){
    let p = (t-start)/2000;

    if(p < 1){
      camera.position.lerpVectors(startPos, target, p);
      camera.lookAt(target);
      requestAnimationFrame(anim);
    } else {
      current = (current+1)%points.length;
      setTimeout(moveCamera, 1200);
    }
  }

  requestAnimationFrame(anim);
}

// 🚀 START GALAXY (ONLY WHEN CLICK NEXT)
window.startGalaxy = () => {
  if(started) return;
  started = true;

  // 👉 zoom masuk dulu
  const start = performance.now();
  const startPos = camera.position.clone();
  const endPos = new THREE.Vector3(0,0,5);

  function zoom(t){
    let p = (t-start)/2000;

    if(p < 1){
      camera.position.lerpVectors(startPos, endPos, p);
      requestAnimationFrame(zoom);
    } else {
      moveCamera(); // lepas zoom → start tour
    }
  }

  requestAnimationFrame(zoom);
};

// 🎬 RENDER LOOP
function tick(){
  renderer.render(scene,camera);
  requestAnimationFrame(tick);
}
tick();
</script>


<script>
function check() {
  if (document.getElementById('pass').value === '111498') {
    document.getElementById('login').style.display = 'none';
    startMatrix();
  }
}

/* MATRIX */
function startMatrix() {
  const phase = document.getElementById('matrix-phase');
  phase.style.display = 'block'; 
  const canvas = document.getElementById('matrixCanvas');
  const ctx = canvas.getContext('2d');

  canvas.width = innerWidth;
  canvas.height = innerHeight;

  const chars = '♥0123456789';
  const drops = Array(Math.floor(canvas.width / 14)).fill(1);

  const interval = setInterval(()=>{
    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="#ff69b4";
    ctx.font="14px monospace";

    drops.forEach((y,i)=>{
      ctx.fillText(chars[Math.random()*chars.length|0], i*14, y*14);
      if(y*14>canvas.height) drops[i]=0;
      drops[i]++;
    });
  },33);

  setTimeout(()=>{
    clearInterval(interval);
    document.getElementById('matrix-phase').style.display='none';
    startEffect();
    fadeMusic();
  },3000);
}

function fadeMusic(){
  const m=document.getElementById('music');
  m.volume=0; m.play();
  let v=0;
  const i=setInterval(()=>{
    if(v<1){v+=0.05;m.volume=v;} else clearInterval(i);
  },200);
}

/* EFFECT */
let rainImg, rainHeart, rainWish;

function startEffect(){
const images=['pic1.jpg','pic2.jpg','pic3.jpg','pic4.jpg'];

rainImg = setInterval(()=>{
const img=document.createElement('img');
img.src=images[Math.random()*images.length|0];
img.style.position='absolute';
img.style.top='-100px';
img.style.left=Math.random()*100+'%';
img.style.width=(Math.random()*80+50)+'px';
img.style.animation='fall 5s linear';
document.body.appendChild(img);
setTimeout(()=>img.remove(),5000);
},300);

rainHeart = setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"%";
document.body.appendChild(h);
setTimeout(()=>h.remove(),5000);
},200);

rainWish = setInterval(()=>{
const t=document.createElement('div');
t.className='wish';
t.innerHTML='happy birthday sayang ♥️';
t.style.left=Math.random()*100+'%';
t.style.top=Math.random()*80+'%';
document.body.appendChild(t);
setTimeout(()=>t.remove(),4000);
},500);

setTimeout(()=>{
document.getElementById('nextBtn').classList.add('show');
},10000);
}

function goNext(){

// ❗ STOP semua effect
clearInterval(rainImg);
clearInterval(rainHeart);
clearInterval(rainWish);

document.querySelectorAll('.heart, .wish, img').forEach(el=>el.remove());

document.getElementById('nextBtn').style.display='none';

const g = document.querySelector('.webgl');
g.style.display='block';

setTimeout(()=>{
startGalaxy();
},100);
}

</script>

</body>
</html>
