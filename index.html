<!DOCTYPE html>
<html>
<head>
  <title>For my beautiful girl ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #1a001a, #000000);
  overflow: hidden;
  color: white;
  font-family: 'Poppins', sans-serif;
  text-align: center;
}

/* LOGIN */
#login {
  position: absolute;
  top: 40%;
  width: 100%;
  z-index: 10;
}

h2 {
  font-family: 'Great Vibes', cursive;
  font-size: 48px;
  color: #ff4d6d;
  text-shadow: 0 0 15px rgba(255, 77, 109, 0.6);
}

input {
  padding: 12px 15px;
  font-size: 16px;
  border-radius: 12px;
  border: none;
  outline: none;
  background: rgba(255, 255, 255, 0.1);
  color: #ff4d6d;
  text-shadow: 0 0 8px rgba(255, 77, 109, 0.8);
  backdrop-filter: blur(10px);
  box-shadow: 0 0 10px rgba(255,255,255,0.2);
  text-align: center;
}

button {
  padding: 10px 20px;
  border-radius: 10px;
  background: pink;
}

/* MATRIX */
#matrix-phase {
  position: absolute;
  inset: 0;
  display: none;
  z-index: 50;
}

#countdown-num {
  position: absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-size:120px;
  color:#ff69b4;
  z-index:60;
  opacity:0;
  text-shadow:0 0 20px #ff1493,0 0 50px #ff69b4;
}

/* EFFECT */
.heart {
  position:absolute;
  animation:fall 5s linear forwards;
}

@keyframes fall {
  to { transform:translateY(110vh); opacity:0; }
}

.wish {
  position:absolute;
  font-family:'Great Vibes';
  color:#ff85c1;
  text-shadow:0 0 10px #ff1493,0 0 30px #ff69b4;
}

/* NEXT */
#nextBtn {
  position:fixed;
  bottom:30px;
  right:30px;
  font-family:'Great Vibes';
  font-size:32px;
  color:#ff69b4;
  text-shadow:0 0 10px #ff1493,0 0 30px #ff69b4;
  opacity:0;
}

#nextBtn.show { opacity:1; }

/* GALAXY */
.webgl {
  position:fixed;
  inset:0;
  display:none;
  z-index:1;
}
</style>
</head>

<body>

<canvas class="webgl"></canvas>

<div id="login">
  <h2>Only For Birthday Girl 💌</h2>
  <input type="password" id="pass">
  <br><br>
  <button onclick="check()">Open 💖</button>
</div>

<div id="matrix-phase">
  <canvas id="matrixCanvas"></canvas>
</div>

<div id="countdown-num"></div>
<div id="nextBtn" onclick="goNext()">next</div>

<audio id="music" loop>
  <source src="song.mp3">
</audio>

<!-- 🌌 GALAXY FIXED -->
<script type="module">
import * as THREE from 'https://cdn.skypack.dev/three@0.150.0';
import { OrbitControls } from 'https://cdn.skypack.dev/three@0.150.0/examples/jsm/controls/OrbitControls.js';

const canvas = document.querySelector('.webgl');
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0,5,20);
scene.add(camera);

const renderer = new THREE.WebGLRenderer({ canvas, alpha:false });
renderer.setClearColor(0x000000, 1); // background hitam solid

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});  

/* CONTROL */
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enablePan = false;
controls.minDistance = 5;
controls.maxDistance = 40;

/* ❤️ TEXTURE (FIXED CENTER) */
const c = document.createElement('canvas');
c.width = 64;
c.height = 64;
const ctx = c.getContext('2d');
ctx.clearRect(0,0,64,64);
ctx.font = "48px serif";
ctx.textAlign = "center";
ctx.textBaseline = "middle";
ctx.fillText("💖", 32, 32);

const texture = new THREE.CanvasTexture(c);

/* 🌪️ SPIRAL */
const count = 5000;
const positions = new Float32Array(count * 3);

for(let i=0;i<count;i++){
  const i3 = i*3;
  const angle = i * 0.25;
  const radius = 0.03 * i;

  positions[i3] = Math.cos(angle)*radius;
  positions[i3+1] = (Math.random()-0.5)*1.5;
  positions[i3+2] = Math.sin(angle)*radius;
}

const geo = new THREE.BufferGeometry();
geo.setAttribute('position', new THREE.BufferAttribute(positions,3));

const mat = new THREE.PointsMaterial({
  size:0.5,
  map:texture,
  transparent:true,
  depthWrite:false
});

const galaxy = new THREE.Points(geo,mat);
scene.add(galaxy);

window.startGalaxy = () => animate();

function animate(){
  requestAnimationFrame(animate);

  controls.update();
  galaxy.rotation.y += 0.002;

  if(camera.position.z > 8){
    camera.position.z -= 0.05;
  }

  camera.lookAt(0,0,0);
  renderer.render(scene,camera);
}
</script>

<script>
function check(){
  if(pass.value==='111498'){
    login.style.display='none';
    startMatrix();
  }
}

/* MATRIX + COUNTDOWN (UNCHANGED) */
function startMatrix(){
  const phase = document.getElementById('matrix-phase');
  phase.style.display='block';
  const canvas = document.getElementById('matrixCanvas');
  const ctx = canvas.getContext('2d');

  canvas.width = innerWidth;
  canvas.height = innerHeight;

  const chars='アイウエオ0123456789♥';
  const size=14;
  const columns=canvas.width/size;
  const drops=Array.from({length:columns},()=>Math.random()*-50);

  const interval=setInterval(()=>{
    ctx.fillStyle="rgba(0,0,0,0.05)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#ff69b4";
    ctx.font=size+"px monospace";

    drops.forEach((y,i)=>{
      ctx.fillText(chars[Math.random()*chars.length|0],i*size,y*size);

      if(y*size>canvas.height && Math.random()>0.97){
        drops[i]=Math.random()*-20;
      }
      drops[i]++;
    });
  },33);

  setTimeout(()=>{
    runCountdown(3,()=>{
      clearInterval(interval);
      phase.style.display='none';
      startEffect();
      fadeMusic();
    });
  },1500);
}

/* COUNTDOWN */
function runCountdown(n,cb){
  const el=document.getElementById('countdown-num');

  function show(num,done){
    el.textContent=num;
    el.style.opacity=1;

    setTimeout(()=>{
      el.style.opacity=0;
      setTimeout(done,300);
    },700);
  }

  function next(){
    if(n<1) return cb();
    show(n--,()=>setTimeout(next,200));
  }
  next();
}

function fadeMusic(){
  music.volume=0;
  music.play();
  let v=0;
  const i=setInterval(()=>{
    if(v<1){v+=0.05;music.volume=v;}
    else clearInterval(i);
  },200);
}

/* EFFECT */
let rainImg,rainHeart,rainWish;

function startEffect(){
  const images=['pic1.jpg','pic2.jpg','pic3.jpg','pic4.jpg'];

  rainImg=setInterval(()=>{
    const img=document.createElement('img');
    img.src=images[Math.random()*images.length|0];
    img.style.position='absolute';
    img.style.top='-100px';
    img.style.left=Math.random()*100+'%';
    img.style.width=(Math.random()*80+50)+'px';
    img.style.animation='fall 5s linear';
    document.body.appendChild(img);
    setTimeout(()=>img.remove(),5000);
  },300);

  rainHeart=setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"%";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
  },200);

  rainWish=setInterval(()=>{
    const t=document.createElement('div');
    t.className='wish';
    t.innerHTML='happy birthday sayang ♥️';
    t.style.left=Math.random()*100+'%';
    t.style.top=Math.random()*80+'%';
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),4000);
  },500);

  setTimeout(()=>{
    nextBtn.classList.add('show');
  },10000);
}

function goNext(){
  clearInterval(rainImg);
  clearInterval(rainHeart);
  clearInterval(rainWish);

  document.querySelectorAll('.heart,.wish,img').forEach(el=>el.remove());

  nextBtn.style.display='none';

  document.querySelector('.webgl').style.display='block';
  document.body.style.background="black";

  setTimeout(()=>startGalaxy(),200);
}
</script>

</body>
</html>
