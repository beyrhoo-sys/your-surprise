<!DOCTYPE html>
<html>
<head>
  <title>For my beautiful girl ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #1a001a, #000000);
      overflow: hidden;
      color: white;
      font-family: 'Poppins', sans-serif;
      text-align: center;
    }

    #login {
      position: absolute;
      top: 40%;
      width: 100%;
      transition: opacity 1s;
    }

    h2 {
      font-family: 'Great Vibes', cursive;
      font-size: 48px;
      color: #ff4d6d;
      text-shadow: 0 0 15px rgba(255, 77, 109, 0.6);
      margin-bottom: 20px;
    }

    input {
      padding: 12px 15px;
      font-size: 16px;
      border-radius: 12px;
      border: none;
      outline: none;
      background: rgba(255, 255, 255, 0.1);
      color: #ff4d6d;
      text-shadow: 0 0 8px rgba(255, 77, 109, 0.8);
      backdrop-filter: blur(10px);
      box-shadow: 0 0 10px rgba(255,255,255,0.2);
      text-align: center;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(45deg, #ff4d6d, #ff85a2);
      color: white;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(255, 77, 109, 0.6);
    }

    #matrix-phase {
      position: absolute;
      inset: 0;
      display: none;
      z-index: 50;
      transition: opacity 1s ease;
    }

    canvas#matrixCanvas {
      width: 100%;
      height: 100%;
    }

    #countdown-num {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: min(22vw, 200px);
      font-weight: 900;
      color: #ff69b4;
      text-shadow: 0 0 40px #ff1493, 0 0 100px #ff69b4;
      z-index: 60;
      opacity: 0;
    }

    .heart {
      position: absolute;
      animation: fall 5s linear forwards;
      pointer-events: none;
    }

    @keyframes fall {
      0% { top: -10%; opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    /* WISH TEXT */
    .wish {
      position: absolute;
      font-family: 'Great Vibes', cursive;
      color: #ff85c1;
      text-shadow: 0 0 5px #ff69b4, 0 0 20px #ff1493;
      animation: wishPop 4s ease-out forwards;
      pointer-events: none;
    }

    @keyframes wishPop {
      0% { transform: scale(0.3); opacity: 0; filter: blur(4px);}
      20% { transform: scale(1.2); opacity: 1; filter: blur(0);}
      100% { transform: translateY(-60px); opacity: 0;}
    }

    /* PREMIUM NEXT BUTTON */
    #nextBtn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      font-family: 'Great Vibes', cursive;
      font-size: 28px;
      color: #ff69b4;
      text-shadow:
        0 0 10px #ff1493,
        0 0 25px #ff69b4,
        0 0 40px #ff1493;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease;
      animation: glowPulse 2.5s infinite ease-in-out;
      z-index: 100;
    }

    #nextBtn.show {
      opacity: 1;
      pointer-events: auto;
    }

    @keyframes glowPulse {
      0% {
        transform: scale(1);
        text-shadow:
          0 0 8px #ff1493,
          0 0 20px #ff69b4;
      }
      50% {
        transform: scale(1.15);
        text-shadow:
          0 0 20px #ff69b4,
          0 0 40px #ff1493,
          0 0 60px #ff69b4;
      }
      100% {
        transform: scale(1);
        text-shadow:
          0 0 8px #ff1493,
          0 0 20px #ff69b4;
      }
    }

    #nextBtn:hover {
      transform: scale(1.25);
    }

  </style>
</head>
<body>

<div id="login">
  <h2>Only For Birthday Girl 💌</h2>
  <input type="password" id="pass" placeholder="Enter password...">
  <br><br>
  <button onclick="check()">Open 💖</button>
</div>

<div id="matrix-phase">
  <canvas id="matrixCanvas"></canvas>
</div>

<div id="countdown-num"></div>

<div id="nextBtn" onclick="goNext()">next</div>

<audio id="music" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
const heartEmojis = ['❤️','💓','💖','💘'];

function check() {
  if (document.getElementById('pass').value === '111498') {
    document.getElementById('login').style.display = 'none';
    startMatrix();
  } else alert('Wrong password!');
}

function startMatrix() {
  document.getElementById('matrix-phase').style.display = 'block';

  setTimeout(() => {
    runCountdown(3, () => {
      document.getElementById('matrix-phase').style.display = 'none';
      startEffect();
      document.getElementById('music').play();
    });
  }, 1000);
}

function runCountdown(n, cb) {
  const el = document.getElementById('countdown-num');
  function show() {
    if (n < 1) return cb();
    el.textContent = n--;
    el.style.opacity = 1;
    setTimeout(() => {
      el.style.opacity = 0;
      setTimeout(show, 300);
    }, 700);
  }
  show();
}

function startEffect() {
  const images = ['pic1.jpg','pic2.jpg','pic3.jpg'];

  setInterval(() => {
    const img = document.createElement('img');
    img.src = images[Math.random()*images.length|0];
    img.style.position = 'absolute';
    img.style.top = '-100px';
    img.style.left = Math.random()*100+'%';
    img.style.width = (Math.random()*80+50)+'px';
    img.style.animation = 'fall 5s linear';
    document.body.appendChild(img);
    setTimeout(()=>img.remove(),5000);
  },300);

  setInterval(() => {
    const heart = document.createElement('div');
    heart.className = 'heart';
    heart.innerHTML = heartEmojis[Math.random()*heartEmojis.length|0];
    heart.style.left = Math.random()*100+'%';
    heart.style.fontSize = (Math.random()*20+10)+'px';
    document.body.appendChild(heart);
    setTimeout(()=>heart.remove(),5000);
  },200);

  setInterval(() => {
    const text = document.createElement('div');
    text.className = 'wish';
    text.innerHTML = 'happy birthday sayang ♥️';
    text.style.left = Math.random()*100+'%';
    text.style.top = (Math.random()*80+10)+'%';
    text.style.fontSize = (Math.random()*20+20)+'px';
    document.body.appendChild(text);
    setTimeout(()=>text.remove(),4000);
  },500);

  // SHOW NEXT AFTER 15s
  setTimeout(()=>{
    document.getElementById('nextBtn').classList.add('show');
  },15000);
}

function goNext() {
  alert("Next part sini 😏");
}
</script>
</body>
</html>
